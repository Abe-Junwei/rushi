# Manual smoke: prove GitHub R2_* secrets can CreateMultipartUpload / PutObject.
name: R2 write smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe R2 write + delete
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ENDPOINT"
            exit 1
          fi
          BUCKET="${R2_BUCKET:-rushi-updates}"
          KEY="_ci-probe/write-smoke-$(date -u +%Y%m%dT%H%M%SZ).txt"
          echo "ok $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/r2-probe.txt

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="${R2_REGION:-auto}"
          export AWS_EC2_METADATA_DISABLED=true
          export AWS_REQUEST_CHECKSUM_CALCULATION=when_required
          export AWS_RESPONSE_CHECKSUM_VALIDATION=when_required

          echo "endpoint=${R2_ENDPOINT}"
          echo "bucket=${BUCKET}"
          echo "key=${KEY}"

          aws --endpoint-url "$R2_ENDPOINT" s3 cp /tmp/r2-probe.txt "s3://${BUCKET}/${KEY}" \
            --content-type text/plain
          echo "WRITE_OK"

          aws --endpoint-url "$R2_ENDPOINT" s3 rm "s3://${BUCKET}/${KEY}"
          echo "DELETE_OK"
