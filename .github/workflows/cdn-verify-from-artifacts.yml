# Re-publish OTA/CDN from a prior successful Mac/Win release run — no rebuild.
#
# Also fixes objects uploaded when R2_ENDPOINT included /rushi-updates
# (they land at s3://rushi-updates/rushi-updates/... instead of bucket root).
#
# Actions → CDN verify from artifacts → Run workflow
#   source_run_id: release run id (e.g. 29474047758)
#   tag: v1.0.0
name: CDN verify from artifacts

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: GitHub Actions run id that produced macos/windows updater fragments
        required: true
        type: string
      tag:
        description: Release tag (e.g. v1.0.0)
        required: true
        type: string
        default: v1.0.0
      unnest_only:
        description: If true, only unnest nested rushi-updates/ prefix + verify (skip artifact re-upload)
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

concurrency:
  group: cdn-verify-${{ inputs.tag }}
  cancel-in-progress: false

env:
  CI: true
  RUSHI_UPDATER_CDN_BASE: https://updates.rushi.app

jobs:
  verify-cdn-release:
    runs-on: macos-latest
    steps:
      - name: Resolve source release commit
        id: source_run
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: Number('${{ inputs.source_run_id }}'),
            });
            core.setOutput('head_sha', data.head_sha);
            core.setOutput('head_branch', data.head_branch || '');

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.source_run.outputs.head_sha }}

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Verify repair tag matches source release version
        run: node scripts/check-release-version-consistency.mjs "--tag=${{ inputs.tag }}"

      - name: Install awscli + jq
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          command -v jq >/dev/null || brew install jq
          # shellcheck source=scripts/ci-pip-venv-install.sh
          source scripts/ci-pip-venv-install.sh awscli
          # shellcheck source=scripts/ci-r2-env.sh
          source scripts/ci-r2-env.sh
          echo "R2_ENDPOINT=$R2_ENDPOINT"
          echo "R2_BUCKET=$R2_BUCKET"

      - name: Unnest misplaced s3://bucket/bucket/ objects
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci-pip-venv-install.sh
          source scripts/ci-pip-venv-install.sh awscli
          # shellcheck source=scripts/ci-r2-env.sh
          source scripts/ci-r2-env.sh
          bash scripts/ci-r2-unnest-bucket-prefix.sh --delete-nested

      - name: Download macOS release bundles
        if: ${{ inputs.unnest_only == false }}
        uses: actions/download-artifact@v7
        with:
          name: macos-release-bundles
          path: artifacts/macos
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Download Windows release bundles
        if: ${{ inputs.unnest_only == false }}
        uses: actions/download-artifact@v7
        with:
          name: windows-release-bundles
          path: artifacts/windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Download Windows offline installer zip
        if: ${{ inputs.unnest_only == false }}
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: windows-offline-x64
          path: artifacts/offline
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Download Windows OTA fragment
        if: ${{ inputs.unnest_only == false }}
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: windows-ota-fragment
          path: artifacts/windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Re-upload packages from artifacts (optional)
        if: ${{ inputs.unnest_only == false }}
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci-pip-venv-install.sh
          source scripts/ci-pip-venv-install.sh awscli
          # shellcheck source=scripts/ci-r2-env.sh
          source scripts/ci-r2-env.sh
          TAR="$(find artifacts/macos -name app.tar.gz | head -1)"
          if [ -z "$TAR" ]; then
            echo "::error::app.tar.gz missing in macos artifact"
            exit 1
          fi
          MAC_BUNDLE="$(cd "$(dirname "$TAR")/.." && pwd)"
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ inputs.tag }}" \
            --mode macos-ota \
            --bundle-root "$MAC_BUNDLE" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "$R2_BUCKET"
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ inputs.tag }}" \
            --mode macos-dmg \
            --bundle-root "$MAC_BUNDLE" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "$R2_BUCKET"
          source scripts/rushi-win-release-artifact-names.sh
          WIN_VER="$(rushi_win_app_version)"
          NSIS_NAME="$(rushi_win_nsis_setup_name "$WIN_VER")"
          OFFLINE_NAME="$(rushi_win_offline_installer_zip_name "$WIN_VER")"
          SETUP="$(find artifacts/windows -name "$NSIS_NAME" | head -1)"
          if [ -z "$SETUP" ]; then
            SETUP="$(find artifacts/windows -name '*安装包.exe' | head -1)"
          fi
          if [ -z "$SETUP" ]; then
            echo "::error::Chinese NSIS 安装包 missing in windows artifact (expected $NSIS_NAME)"
            find artifacts/windows -type f | head -50
            exit 1
          fi
          WIN_BUNDLE="$(cd "$(dirname "$SETUP")/.." && pwd)"
          OFFLINE="$(find artifacts/offline artifacts/windows -name "$OFFLINE_NAME" 2>/dev/null | head -1 || true)"
          if [ -z "$OFFLINE" ]; then
            OFFLINE="$(find artifacts/offline artifacts/windows -name '*离线安装包.zip' 2>/dev/null | head -1 || true)"
          fi
          if [ -z "$OFFLINE" ] && [ -f artifacts/offline/windows-offline-x64.zip ]; then
            OFFLINE="artifacts/offline/windows-offline-x64.zip"
          fi
          if [ -n "$OFFLINE" ]; then
            cp "$OFFLINE" "./windows-offline-x64.zip"
            if [ -f "${OFFLINE}.sha256" ]; then
              cp "${OFFLINE}.sha256" "./windows-offline-x64.zip.sha256"
            elif [ -f "artifacts/offline/windows-offline-x64.zip.sha256" ]; then
              cp "artifacts/offline/windows-offline-x64.zip.sha256" "./windows-offline-x64.zip.sha256"
            fi
          fi
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ inputs.tag }}" \
            --mode windows \
            --bundle-root "$WIN_BUNDLE" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "$R2_BUCKET"
          if [ -f "${SETUP}.sig" ]; then
            bash scripts/ci-upload-updater-cdn.sh \
              --tag "${{ inputs.tag }}" \
              --mode windows-ota \
              --bundle-root "$WIN_BUNDLE" \
              --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
              --bucket "$R2_BUCKET"
          fi

      - name: Merge and upload OTA manifest
        if: ${{ inputs.unnest_only == false }}
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci-pip-venv-install.sh
          source scripts/ci-pip-venv-install.sh awscli
          # shellcheck source=scripts/ci-r2-env.sh
          source scripts/ci-r2-env.sh
          MAC_FRAGMENT="$(find artifacts/macos -name updater-fragment.json | head -1)"
          WIN_FRAGMENT="$(find artifacts/windows -name updater-fragment.json | head -1)"
          if [ -z "$MAC_FRAGMENT" ] || [ -z "$WIN_FRAGMENT" ]; then
            echo "::error::Missing updater fragments"
            exit 1
          fi
          bash scripts/ci-merge-updater-manifest.sh \
            --tag "${{ inputs.tag }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --fragment "$MAC_FRAGMENT" \
            --fragment "$WIN_FRAGMENT" \
            --out dist/updater/latest.json \
            --require-platforms "darwin-aarch64,windows-x86_64" \
            --upload \
            --bucket "$R2_BUCKET"

      - name: Verify OTA manifest on CDN
        run: |
          set -euo pipefail
          bash scripts/ci-verify-updater-manifest.sh \
            --tag "${{ inputs.tag }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}"
