# Optional heavy build: FunASR sidecar onedir (long, large artifacts).
# Trigger: manual (workflow_dispatch). Not part of default PR CI.
name: asr-sidecar-build-nightly

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-sidecar-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ffmpeg (sidecar bundle)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build Linux x86_64 FunASR sidecar (PyInstaller)
        run: bash scripts/build-asr-sidecar-unix.sh
        timeout-minutes: 120

      - name: Post-build sidecar health smoke
        run: bash scripts/smoke-asr-sidecar-health.sh
        timeout-minutes: 10

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-asr-sidecar
          path: apps/desktop/src-tauri/resources/bundled-asr/
          retention-days: 7
          if-no-files-found: warn
