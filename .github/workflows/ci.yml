name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doc-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check markdown links (Rushi-internal + optional Jieyu)
        run: node scripts/check-internal-doc-links.mjs

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies (workspaces)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Vite production build
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo check (Tauri shell)
        working-directory: apps/desktop/src-tauri
        run: cargo check --all-targets

  asr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rushi-asr (dev)
        working-directory: services/asr
        run: pip install -e ".[dev]"

      - name: Pytest
        working-directory: services/asr
        run: python -m pytest
