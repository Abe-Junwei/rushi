name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doc-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check markdown links (Rushi-internal + optional Jieyu)
        run: node scripts/check-internal-doc-links.mjs

  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: apps/desktop/src-tauri
        run: cargo audit

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pip-audit (rushi-asr venv)
        working-directory: services/asr
        run: |
          python3 -m venv .venv
          # shellcheck source=/dev/null
          source .venv/bin/activate
          python -m pip install --upgrade "pip>=26.1.2"
          pip install -q -e ".[dev]"
          pip install pip-audit
          pip-audit

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies (workspaces)
        run: npm ci || npm ci || npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest with coverage
        run: npm run test:coverage -w @rushi/desktop

      - name: Core performance gates
        run: npm run test:perf -w @rushi/desktop

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-coverage
          path: apps/desktop/coverage
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: apps/desktop/coverage/lcov.info
          flags: desktop
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Vite production build
        run: npm run build

      - name: Architecture guard
        run: node scripts/check-architecture-guard.mjs

  desktop-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies (workspaces)
        run: npm ci

      - name: Ensure Windows npm native bindings
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/ci-ensure-windows-npm-native-bindings.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux packages for Tauri (cargo test)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Cargo test (sidecar + transcribe guards)
        working-directory: apps/desktop/src-tauri
        run: cargo test --lib

      - name: Tauri debug build (pack regression)
        if: runner.os == 'Linux'
        working-directory: apps/desktop
        run: npm run tauri -- build --debug --no-bundle
        timeout-minutes: 45

      - name: Upload Tauri debug binary
        if: runner.os == 'Linux' && failure()
        uses: actions/upload-artifact@v7
        with:
          name: tauri-debug-binary
          path: apps/desktop/src-tauri/target/debug/rushi-desktop
          retention-days: 3
          if-no-files-found: ignore

      - name: Cargo clippy + fmt check
        working-directory: apps/desktop/src-tauri
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo fmt --check

  asr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg (transcribe tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: rushi-asr venv + pytest (same as npm run asr:test)
        run: bash scripts/run-asr-pytest.sh -q

      - name: Start rushi-asr (stub) for P4 manifest eval
        working-directory: services/asr
        run: |
          # shellcheck source=/dev/null
          source .venv/bin/activate
          nohup python -m rushi_asr > /tmp/rushi-asr-ci.log 2>&1 &
          echo $! > /tmp/rushi-asr-ci.pid
          ok=0
          for _ in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8741/health >/dev/null; then
              ok=1
              break
            fi
            sleep 0.5
          done
          if [ "$ok" != 1 ]; then
            echo "ASR did not become healthy in time"
            cat /tmp/rushi-asr-ci.log || true
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Playwright E2E (ASR contract; self-hosted mock sidecar)
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          npm ci
          npm run desktop:test:e2e:asr

      - name: Playwright E2E (desktop shell smoke)
        working-directory: apps/desktop
        run: |
          npx playwright install chromium
          npm run test:e2e:desktop

      - name: P4 eval placeholder wav (manifest paths; not in git)
        run: bash scripts/eval-generate-placeholders.sh

      - name: Eval manifest batch (eval-run.py)
        run: python3 scripts/eval-run.py

      - name: Stop rushi-asr
        if: always()
        run: |
          if [ -f /tmp/rushi-asr-ci.pid ]; then
            kill "$(cat /tmp/rushi-asr-ci.pid)" 2>/dev/null || true
          fi
