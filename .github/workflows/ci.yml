name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doc-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check markdown links (Rushi-internal + optional Jieyu)
        run: node scripts/check-internal-doc-links.mjs

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies (workspaces)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Vite production build
        run: npm run build

      - name: Architecture guard
        run: node scripts/check-architecture-guard.mjs

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux packages for Tauri (cargo check + user-guide PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pandoc wkhtmltopdf

      - name: Cargo clippy + fmt check
        working-directory: apps/desktop/src-tauri
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo fmt --check

      - name: Tauri build (deb bundle smoke)
        working-directory: apps/desktop
        run: npm run tauri -- build -- --bundles deb
        timeout-minutes: 25

  asr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg (transcribe tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: rushi-asr venv + pytest (same as npm run asr:test)
        run: bash scripts/run-asr-pytest.sh -q

      - name: Start rushi-asr (stub) for P4 manifest eval
        working-directory: services/asr
        run: |
          # shellcheck source=/dev/null
          source .venv/bin/activate
          nohup python -m rushi_asr > /tmp/rushi-asr-ci.log 2>&1 &
          echo $! > /tmp/rushi-asr-ci.pid
          ok=0
          for _ in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8741/health >/dev/null; then
              ok=1
              break
            fi
            sleep 0.5
          done
          if [ "$ok" != 1 ]; then
            echo "ASR did not become healthy in time"
            cat /tmp/rushi-asr-ci.log || true
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Playwright E2E (loopback /health)
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          npm ci
          npm run desktop:test:e2e

      - name: P4 eval placeholder wav (manifest paths; not in git)
        run: bash scripts/eval-generate-placeholders.sh

      - name: Eval manifest batch (eval-run.py)
        run: python3 scripts/eval-run.py

      - name: Stop rushi-asr
        if: always()
        run: |
          if [ -f /tmp/rushi-asr-ci.pid ]; then
            kill "$(cat /tmp/rushi-asr-ci.pid)" 2>/dev/null || true
          fi
