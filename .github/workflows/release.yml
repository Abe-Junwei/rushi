# Full Tauri bundles — tag push builds macOS + Windows and uploads installers/OTA to CDN only.
# Linux desktop: NOT published (no .deb / AppImage / tauri-linux job).
# Windows portable/NSIS: CI on tag push; local smoke — `npm run release:win` on a Windows machine.
# Unsigned v1: prefer CDN 如是我闻_*_便携版.zip (green zip) over unsigned 安装包.exe (SmartScreen).
# Order: NSIS → portable zip → CDN core → OTA fragment → CUDA (best-effort, never blocks core).
# Do NOT create GitHub Release assets for installers — distribution host is updates.rushi.app (R2).
# Push tag only (`git push origin vX.Y.Z`). Sidecar is built before Tauri bundle.
# Win artifact names: 如是我闻_<ver>_Windows_x64_{便携版.zip|安装包.exe|CUDA侧车.zip}
#   (see scripts/rushi-win-release-artifact-names.sh).
# Release order: remote CI first. Local `npm run release:win` + `release:win:upload`
#   ONLY if Windows fails due to model-pack OOM (makensis/zip/runner memory).
# macOS signing (optional): set valid APPLE_* repository secrets (base64 .p12).
# App OTA: set TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD + R2_* secrets.
#   Tauri generates .app.tar.gz + .sig (mac) and Chinese NSIS + .sig (win);
#   verify-cdn-release merges latest.json and uploads to Cloudflare R2.
# Plan B (v0.1.8+): default Paraformer models are bundled into the **macOS** installer.
# Windows (2026-07+): NSIS ships CPU sidecar only (makensis OOM with CPU+models — second knife).
#   **portable zip (主分发) MUST include CPU sidecar + Plan B models** (stage after NSIS).
#   CUDA onedir is a CDN opt-in zip + signed runtime manifest (asr-sidecar-cuda). Secret:
#   RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX. Compile-time default:
#   RUSHI_DEFAULT_LOCAL_RUNTIME_MANIFEST_URL=https://updates.rushi.app/runtime/rushi-runtime-manifest.json
# Windows Git Bash: never pass /d/a/... absolutes into native node/python (cwd-relative only).
#
# IMPORTANT: To test workflow changes, use Actions → Release build → Run workflow
# on branch `main`. Do NOT use "Re-run failed jobs" on an old run — that reuses
# the workflow file from the original commit.
name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref_name || github.sha }}
  # Never cancel an in-flight tag upload — force-pushing v* would leave partial CDN objects.
  cancel-in-progress: false

env:
  CI: true
  BUNDLE_ROOT: apps/desktop/src-tauri/target/release/bundle
  RUSHI_UPDATER_CDN_BASE: https://updates.rushi.app

jobs:
  tauri-macos:
    if: ${{ !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Workflow context
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install ffmpeg (sidecar bundle)
        run: brew install ffmpeg

      - name: Build macOS FunASR sidecar (PyInstaller)
        run: bash scripts/build-asr-sidecar-unix.sh
        timeout-minutes: 120

      - name: Post-build sidecar health smoke
        run: bash scripts/smoke-asr-sidecar-health.sh
        timeout-minutes: 10

      - name: Bootstrap ASR venv (bundled models)
        run: bash scripts/bootstrap-asr-venv.sh

      - name: Cache ModelScope download (Plan B staging)
        uses: actions/cache@v6
        with:
          path: dist/bundled-asr-models/.modelscope-cache
          key: bundled-asr-models-v1-macos-${{ hashFiles('resources/bundled-asr-models-manifest.template.json', 'services/asr/rushi_asr/defaults.py') }}
          restore-keys: bundled-asr-models-v1-macos-

      - name: Stage bundled ASR models (Plan B)
        env:
          STAGE_MODEL_MAX_ATTEMPTS: "8"
        run: npm run asr:stage-bundled-models
        timeout-minutes: 180


      - name: Detect macOS signing secrets
        id: mac_sign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No APPLE_CERTIFICATE — building unsigned."
            exit 0
          fi
          if ! echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/apple-cert.p12 2>/dev/null; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_CERTIFICATE is not valid base64 — building unsigned."
            exit 0
          fi
          for v in APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v}" ]; then
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "::warning::$v is missing — building unsigned."
              exit 0
            fi
          done
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Valid Apple signing secrets detected."

      - name: Tauri build unsigned (app + dmg)
        if: steps.mac_sign.outputs.enabled != 'true'
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app,dmg
        timeout-minutes: 50

      - name: Tauri build signed (app + dmg)
        if: steps.mac_sign.outputs.enabled == 'true'
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app,dmg
        timeout-minutes: 50

      - name: Normalize macOS DMG filename (ASCII)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          bash scripts/ci-normalize-macos-dmg-name.sh \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --version "$VERSION"

      - name: Generate SHA256 checksums (macOS)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          shopt -s nullglob
          for f in "${{ env.BUNDLE_ROOT }}/dmg/"*.dmg; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Normalize macOS updater artifact names
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          MACOS_DIR="${{ env.BUNDLE_ROOT }}/macos"
          shopt -s nullglob
          tar_files=("$MACOS_DIR"/*.tar.gz)
          if [ ${#tar_files[@]} -eq 0 ]; then
            echo "::error::Updater .tar.gz missing — set TAURI_SIGNING_PRIVATE_KEY and matching pubkey in tauri.conf.json"
            exit 1
          fi
          TAR="${tar_files[0]}"
          if [ "$(basename "$TAR")" = "app.tar.gz" ]; then
            echo "Updater artifact already normalized."
            exit 0
          fi
          mv "$TAR" "$MACOS_DIR/app.tar.gz"
          if [ -f "${TAR}.sig" ]; then
            mv "${TAR}.sig" "$MACOS_DIR/app.tar.gz.sig"
          fi
          echo "Renamed $(basename "$TAR") -> app.tar.gz"

      - name: Generate updater fragment (macOS release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          bash scripts/ci-generate-updater-latest-json.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --platform darwin-aarch64

      # Keep bundles on Actions even if R2 upload fails (token/ACL issues).
      - name: Upload macOS workflow artifacts
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-bundles
          path: |
            ${{ env.BUNDLE_ROOT }}/dmg/*.dmg
            ${{ env.BUNDLE_ROOT }}/dmg/*.sha256
            ${{ env.BUNDLE_ROOT }}/macos/app.tar.gz
            ${{ env.BUNDLE_ROOT }}/macos/app.tar.gz.sig
            ${{ env.BUNDLE_ROOT }}/macos/updater-fragment.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS OTA + DMG to Cloudflare R2 CDN
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT). Optional R2_BUCKET (default rushi-updates)."
            exit 1
          fi
          if ! command -v aws >/dev/null 2>&1; then
            brew install awscli
          fi
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode macos-ota \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode macos-dmg \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

  tauri-windows:
    if: ${{ !cancelled() }}
    runs-on: windows-latest
    # Prefer this job. Local pack only on model-pack OOM (see windows-release-checklist §5).
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Ensure Windows npm native bindings
        shell: bash
        run: bash scripts/ci-ensure-windows-npm-native-bindings.sh

      - name: Resolve Chinese Windows artifact names
        id: win_names
        shell: bash
        run: |
          set -euo pipefail
          source scripts/rushi-win-release-artifact-names.sh
          VER="$(rushi_win_app_version)"
          PORTABLE="$(rushi_win_portable_zip_name "$VER")"
          NSIS="$(rushi_win_nsis_setup_name "$VER")"
          CUDA="$(rushi_win_cuda_zip_name "$VER")"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "portable=$PORTABLE" >> "$GITHUB_OUTPUT"
          echo "nsis=$NSIS" >> "$GITHUB_OUTPUT"
          echo "cuda=$CUDA" >> "$GITHUB_OUTPUT"
          {
            echo "WIN_APP_VERSION=$VER"
            echo "WIN_PORTABLE_ZIP=$PORTABLE"
            echo "WIN_NSIS_SETUP=$NSIS"
            echo "WIN_CUDA_ZIP=$CUDA"
          } >> "$GITHUB_ENV"
          echo "Portable: $PORTABLE"
          echo "NSIS:     $NSIS"

      - name: Workflow context
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Portable: ${{ env.WIN_PORTABLE_ZIP }}"
          echo "NSIS: ${{ env.WIN_NSIS_SETUP }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Build Windows FunASR sidecar (CPU only for NSIS)
        run: npm run asr:build-sidecar-windows-cpu
        timeout-minutes: 120

      - name: Verify bundled CPU sidecar artifacts
        shell: bash
        run: |
          EXE="apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/rushi-asr-sidecar.exe"
          test -f "$EXE"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/_internal/funasr/version.txt"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/_internal/ffmpeg.exe"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/sidecar-build-stamp.txt"
          # CUDA must NOT be present in the install tree before NSIS (CDN opt-in).
          if [ -e "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda" ]; then
            echo "::error::CUDA onedir must not be staged before NSIS; remove rushi-asr-sidecar-cuda"
            exit 1
          fi

      - name: Detect Windows signing secrets
        id: win_sign
        shell: bash
        env:
          WINDOWS_SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          WINDOWS_SIGN_PFX_PATH: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_SIGNTOOL_PATH" ] || [ -z "$WINDOWS_SIGN_PFX_PATH" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No Windows signing secrets — building unsigned sidecars."
            exit 0
          fi
          if [ -z "${WINDOWS_SIGN_PFX_PASSWORD:-}" ]; then
            echo "::error::WINDOWS_SIGNTOOL_PATH + WINDOWS_SIGN_PFX_PATH set but WINDOWS_SIGN_PFX_PASSWORD is empty."
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Valid Windows signing secrets detected."

      - name: Authenticode sign CPU sidecar (release tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGNTOOL: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          SIGN_PFX: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          SIGN_PASS: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
          RELEASE_BUILD: "1"
        run: pwsh scripts/sign-windows-sidecar.ps1

      - name: Skip Windows sidecar signing (no secrets)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled != 'true'
        run: echo "::warning::Skipping Authenticode signing — set WINDOWS_SIGNTOOL_PATH + WINDOWS_SIGN_PFX_PATH for signed releases."

      - name: Post-build sidecar health smoke
        shell: pwsh
        run: pwsh scripts/smoke-asr-sidecar-health.ps1
        timeout-minutes: 10

      - name: Guard — Plan B models must not enter Windows NSIS
        # Second knife: NSIS still OOMs with CPU+models (see win-nsis research).
        # Plan B weights are staged AFTER NSIS into the portable zip (主分发).
        shell: bash
        run: |
          set -euo pipefail
          MODELS="apps/desktop/src-tauri/resources/bundled-asr-models"
          if [ -d "$MODELS/modelscope" ] || [ -d "$MODELS/models" ]; then
            echo "::error::Plan B model weights present under $MODELS — Windows NSIS second knife forbids bundling them (makensis mmap OOM)."
            find "$MODELS" -maxdepth 3 -type d 2>/dev/null || true
            exit 1
          fi
          if [ -e "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda" ]; then
            echo "::error::CUDA onedir must not be staged before NSIS."
            exit 1
          fi
          if [ ! -d "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar" ]; then
            echo "::error::CPU sidecar onedir missing before NSIS — Windows release must ship the sidecar."
            exit 1
          fi
          echo "OK: CPU sidecar present; no Plan B modelscope/ and no CUDA onedir before NSIS."

      - name: Measure Windows bundle size spike (CPU only before NSIS)
        shell: pwsh
        run: pwsh scripts/ci-measure-windows-bundle-size.ps1

      - name: Tauri build (NSIS installer + updater artifacts)
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSHI_DEFAULT_LOCAL_RUNTIME_MANIFEST_URL: https://updates.rushi.app/runtime/rushi-runtime-manifest.json
        run: npm run tauri -- build --bundles nsis
        timeout-minutes: 90

      - name: Normalize Windows NSIS installer name (Chinese)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          bash scripts/ci-normalize-windows-nsis-name.sh \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --version "${{ env.WIN_APP_VERSION }}"

      - name: Measure NSIS artifact size
        shell: pwsh
        run: |
          $nsis = "apps/desktop/src-tauri/target/release/bundle/nsis/${{ env.WIN_NSIS_SETUP }}"
          if (-not (Test-Path $nsis)) {
            $alt = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis" -Filter *.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notlike '*.sig' } |
              Select-Object -First 1
            if ($alt) { $nsis = $alt.FullName }
          }
          pwsh scripts/ci-measure-windows-bundle-size.ps1 -NsisPath $nsis
        continue-on-error: false

      # Authenticode (optional) before portable zip so the green zip can ship a signed exe.
      # Do NOT Authenticode-sign the NSIS setup here — that would invalidate the Tauri updater .sig.
      - name: Detect Windows exe signing secret
        id: win_exe_sign
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_CERTIFICATE" ] || [ -z "$WINDOWS_CERTIFICATE_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Sign Windows portable exe (optional Authenticode)
        if: steps.win_exe_sign.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $certPath = Join-Path $env:TEMP "windows-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found but WINDOWS_CERTIFICATE secrets are set — fail closed."
          }
          $exe = "apps/desktop/src-tauri/target/release/rushi-desktop.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Missing $exe — cannot Authenticode-sign."
          }
          & $signtool.FullName sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe
          if ($LASTEXITCODE -ne 0) { throw "signtool failed for $exe (exit $LASTEXITCODE)" }
          Write-Host "Signed $exe (portable zip only; NSIS .sig left intact)"

      # Portable (+ CDN) BEFORE updater fragment so a missing .sig cannot block the green zip.
      # Stage Plan B models AFTER NSIS so makensis stays under budget; portable must ship them.
      - name: Bootstrap ASR venv (Plan B models for portable)
        shell: bash
        run: bash scripts/bootstrap-asr-venv.sh

      - name: Cache ModelScope download (Plan B staging)
        uses: actions/cache@v6
        with:
          path: dist/bundled-asr-models/.modelscope-cache
          key: bundled-asr-models-v1-windows-${{ hashFiles('resources/bundled-asr-models-manifest.template.json', 'services/asr/rushi_asr/defaults.py') }}
          restore-keys: bundled-asr-models-v1-windows-

      - name: Stage bundled ASR models into resources (portable)
        shell: bash
        env:
          STAGE_MODEL_MAX_ATTEMPTS: "8"
        run: npm run asr:stage-bundled-models
        timeout-minutes: 180

      - name: Guard — portable resources must include sidecar + Plan B models
        shell: bash
        run: |
          set -euo pipefail
          SIDECAR="apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar"
          MODELS="apps/desktop/src-tauri/resources/bundled-asr-models"
          if [ ! -d "$SIDECAR" ]; then
            echo "::error::Missing CPU sidecar onedir ($SIDECAR) — Windows portable must ship the sidecar."
            exit 1
          fi
          bash scripts/preflight-bundled-asr-models.sh "$MODELS"
          echo "OK: Windows portable staging has CPU sidecar + Plan B models."

      - name: Measure Windows portable staging size (CPU + models)
        shell: pwsh
        run: pwsh scripts/ci-measure-windows-bundle-size.ps1 -AllowModelsForPortable

      - name: Build Windows portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = "apps/desktop/src-tauri"
          $exe = Join-Path $root "target/release/rushi-desktop.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Missing $exe — run tauri build before packaging portable zip."
          }
          $stage = "dist/windows-portable"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe (Join-Path $stage "rushi-desktop.exe")
          Copy-Item (Join-Path $root "resources") (Join-Path $stage "resources") -Recurse
          $zip = Join-Path (Get-Location) $env:WIN_PORTABLE_ZIP
          if (Test-Path $zip) { Remove-Item -Force $zip }
          # Compress-Archive OOMs on sidecar+models (~2GB+); tar streams reliably on Win10+.
          Push-Location $stage
          try {
            & tar -a -c -f $zip *
            if ($LASTEXITCODE -ne 0) { throw "tar zip failed with exit $LASTEXITCODE" }
          } finally {
            Pop-Location
          }

      - name: Verify Windows portable zip (sidecar + models required)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zip = $env:WIN_PORTABLE_ZIP
          if (-not (Test-Path -LiteralPath $zip)) {
            throw "Missing $zip"
          }
          Get-Item -LiteralPath $zip
          $probe = "dist/windows-portable-probe"
          if (Test-Path $probe) { Remove-Item -Recurse -Force $probe }
          # Expand-Archive can choke on large zips; use tar.
          New-Item -ItemType Directory -Force -Path $probe | Out-Null
          & tar -xf $zip -C $probe
          if ($LASTEXITCODE -ne 0) { throw "tar extract failed ($LASTEXITCODE)" }
          $sidecar = Join-Path $probe "resources\bundled-asr\rushi-asr-sidecar"
          $manifest = Join-Path $probe "resources\bundled-asr-models\manifest.json"
          $modelscope = Join-Path $probe "resources\bundled-asr-models\modelscope"
          if (-not (Test-Path -LiteralPath $sidecar)) {
            throw "portable zip missing CPU sidecar onedir: $sidecar"
          }
          if (-not (Test-Path -LiteralPath $manifest)) {
            throw "portable zip missing Plan B models manifest: $manifest"
          }
          if (-not (Test-Path -LiteralPath $modelscope)) {
            throw "portable zip missing Plan B modelscope/: $modelscope"
          }
          Write-Host "OK: $zip contains CPU sidecar + Plan B models."
          Remove-Item -Recurse -Force $probe

      - name: Checksum portable + NSIS
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($f in @(
            $env:WIN_PORTABLE_ZIP,
            "apps/desktop/src-tauri/target/release/bundle/nsis/$($env:WIN_NSIS_SETUP)"
          )) {
            if (-not (Test-Path -LiteralPath $f)) {
              throw "Missing $f for checksum"
            }
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $f).Hash.ToLowerInvariant()
            $name = Split-Path -Leaf $f
            Set-Content -Encoding utf8 -Path "$f.sha256" -Value "$hash  $name"
            Write-Host "Wrote $f.sha256"
          }

      - name: Upload Windows portable zip artifact (early)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable-x64
          path: |
            ${{ env.WIN_PORTABLE_ZIP }}
            ${{ env.WIN_PORTABLE_ZIP }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows portable + NSIS to CDN (early)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          source scripts/ci-pip-venv-install.sh awscli
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode windows \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

      - name: Generate updater fragment (Windows release)
        # Tag-only: workflow_dispatch on a branch would embed github.ref_name as a fake tag.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: win_fragment
        shell: bash
        run: |
          set -euo pipefail
          SIG="${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}.sig"
          if [ ! -f "$SIG" ]; then
            echo "::error::Missing $SIG — set TAURI_SIGNING_PRIVATE_KEY for OTA, or expect no Windows updater fragment."
            exit 1
          fi
          bash scripts/ci-generate-updater-latest-json.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --platform windows-x86_64

      - name: Upload Windows OTA (.exe + .sig) to CDN
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_fragment.outcome == 'success'
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          source scripts/ci-pip-venv-install.sh awscli
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode windows-ota \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

      # CUDA is best-effort: never fail the job after portable/NSIS are on CDN.
      - name: Build Windows CUDA sidecar (CDN opt-in, after NSIS)
        id: cuda_build
        run: npm run asr:build-sidecar-windows-cuda
        timeout-minutes: 120
        continue-on-error: true

      - name: Authenticode sign CUDA sidecar (release tag)
        id: cuda_sign
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled == 'true' && steps.cuda_build.outcome == 'success'
        shell: pwsh
        env:
          SIGNTOOL: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          SIGN_PFX: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          SIGN_PASS: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
          RELEASE_BUILD: "1"
        run: pwsh scripts/sign-windows-sidecar.ps1
        continue-on-error: true

      - name: Package CUDA sidecar zip + checksum
        id: cuda_zip
        if: steps.cuda_build.outcome == 'success'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cudaDir = "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda"
          $exe = Join-Path $cudaDir "rushi-asr-sidecar-cuda.exe"
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing $exe" }
          New-Item -ItemType Directory -Force -Path "dist/cuda-cdn" | Out-Null
          $zip = Join-Path (Get-Location) "dist/cuda-cdn/$($env:WIN_CUDA_ZIP)"
          if (Test-Path -LiteralPath $zip) { Remove-Item -Force $zip }
          # Zip root must be rushi-asr-sidecar-cuda/ for exe_relpath in manifest.
          Compress-Archive -Path $cudaDir -DestinationPath $zip
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          Set-Content -Encoding utf8 -Path "$zip.sha256" -Value "$hash  $($env:WIN_CUDA_ZIP)"
          Get-Item $zip | Format-List Name, Length, FullName
          "ok=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        continue-on-error: true

      - name: Publish CUDA runtime manifest
        id: cuda_manifest
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.cuda_zip.outcome == 'success'
        shell: bash
        env:
          RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX: ${{ secrets.RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX:-}" ]; then
            echo "::error::Missing RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX for CUDA manifest signing."
            exit 1
          fi
          source scripts/ci-pip-venv-install.sh cryptography
          bash scripts/ci-publish-cuda-runtime-manifest.sh \
            --tag "${{ github.ref_name }}" \
            --zip "dist/cuda-cdn/${{ env.WIN_CUDA_ZIP }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}"

      - name: Upload Windows CUDA to Cloudflare R2 CDN
        id: cuda_cdn
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.cuda_zip.outcome == 'success' && steps.cuda_manifest.outcome == 'success'
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          source scripts/ci-pip-venv-install.sh awscli
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode windows-cuda \
            --cuda-zip "dist/cuda-cdn/${{ env.WIN_CUDA_ZIP }}" \
            --runtime-manifest dist/runtime-manifest/rushi-runtime-manifest.json \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

      - name: Report CUDA opt-in outcome
        if: always() && (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        shell: bash
        run: |
          set -euo pipefail
          build="${{ steps.cuda_build.outcome }}"
          zip="${{ steps.cuda_zip.outcome }}"
          man="${{ steps.cuda_manifest.outcome }}"
          cdn="${{ steps.cuda_cdn.outcome }}"
          echo "CUDA outcomes: build=$build zip=$zip manifest=$man cdn=$cdn"
          if [ "$build" != "success" ] || [ "$zip" != "success" ]; then
            echo "::error::CUDA sidecar build/package failed or skipped — CDN opt-in zip missing. Core portable/NSIS were still published."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ] && { [ "$man" != "success" ] || [ "$cdn" != "success" ]; }; then
            echo "::error::CUDA manifest/CDN upload failed — runtime GPU install may be unavailable. Core portable/NSIS were still published."
            exit 0
          fi
          echo "CUDA opt-in pipeline OK."

      - name: Upload Windows workflow artifacts (required core)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-bundles
          path: |
            ${{ env.WIN_PORTABLE_ZIP }}
            ${{ env.WIN_PORTABLE_ZIP }}.sha256
            ${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}
            ${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}.sha256
            dist/windows-bundle-size-spike.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows OTA fragment artifacts
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_fragment.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: windows-ota-fragment
          path: |
            ${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}.sig
            ${{ env.BUNDLE_ROOT }}/nsis/updater-fragment.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows CUDA artifacts (optional)
        if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) && steps.cuda_zip.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: windows-cuda-cdn
          path: |
            dist/cuda-cdn/**
            dist/runtime-manifest/**
          if-no-files-found: warn
          retention-days: 14

  verify-cdn-release:
    needs: [tauri-macos, tauri-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.tauri-macos.result == 'success' && needs.tauri-windows.result == 'success'
    # macOS only — no Linux release matrix; avoid ubuntu runners for this job.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v6
        with:
          name: macos-release-bundles
          path: artifacts/macos

      - uses: actions/download-artifact@v6
        with:
          name: windows-release-bundles
          path: artifacts/windows

      - uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: windows-ota-fragment
          path: artifacts/windows

      - uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: windows-cuda-cdn
          path: artifacts/windows-cuda

      - name: Merge and upload OTA manifest
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          command -v jq >/dev/null || brew install jq
          source scripts/ci-pip-venv-install.sh awscli
          MAC_FRAGMENT="$(find artifacts/macos -name updater-fragment.json | head -1)"
          WIN_FRAGMENT="$(find artifacts/windows -name updater-fragment.json | head -1)"
          if [ -z "$MAC_FRAGMENT" ] || [ -z "$WIN_FRAGMENT" ]; then
            echo "::error::Missing updater fragments in workflow artifacts."
            find artifacts -type f
            exit 1
          fi
          bash scripts/ci-merge-updater-manifest.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --fragment "$MAC_FRAGMENT" \
            --fragment "$WIN_FRAGMENT" \
            --out dist/updater/latest.json \
            --upload \
            --bucket "${R2_BUCKET:-rushi-updates}"

      - name: Verify OTA manifest on CDN
        run: |
          bash scripts/ci-verify-updater-manifest.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}"
