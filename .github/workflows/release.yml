# Full Tauri bundles — tag push builds macOS + Windows and uploads installers/OTA to CDN only.
# Linux desktop: NOT published (no .deb / AppImage / tauri-linux job).
# Windows portable/NSIS: CI on tag push; local smoke — `npm run release:win` on a Windows machine.
# Unsigned v1: prefer CDN 如是我闻_*_便携版.zip (green zip) over unsigned 安装包.exe (SmartScreen).
# Order (Win): stage Plan B → NSIS → portable zip → CDN core → OTA fragment(soft) → CUDA(soft).
# Do NOT create GitHub Release assets for installers — distribution host is updates.rushi.app (R2).
# Push tag only (`git push origin vX.Y.Z`). Sidecar is built before Tauri bundle.
# Win artifact names: 如是我闻_<ver>_Windows_x64_{便携版.zip|安装包.exe|CUDA侧车.zip}
#   (see scripts/rushi-win-release-artifact-names.sh).
# Win job: self-hosted runner (label rushi-release) — GH hosted windows-latest OOMs on Plan B NSIS.
#   Fallback: local `npm run release:win` + `release:win:upload` if self-hosted offline.
# macOS signing (optional): set valid APPLE_* repository secrets (base64 .p12).
# App OTA: set TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD + R2_* secrets.
#   Tauri generates .app.tar.gz + .sig (mac) and Chinese NSIS + .sig (win);
#   verify-cdn-release merges latest.json and uploads to Cloudflare R2.
#   Missing .sig: OTA fragment soft-skipped; install CDN still publishes.
#   latest.json upload is HARD-GATED: both darwin-aarch64 + windows-x86_64 complete
#   (url+signature) required — Tauri validates the whole static JSON (refuse partial).
# Plan B (v0.1.8+): default Paraformer models are bundled into the **macOS** installer.
# Windows (2026-07-19+): NSIS + portable BOTH ship CPU sidecar + Plan B models (stage before NSIS).
#   CUDA onedir remains CDN opt-in zip + signed runtime manifest (asr-sidecar-cuda). Secret:
#   RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX. Compile-time default:
#   RUSHI_DEFAULT_LOCAL_RUNTIME_MANIFEST_URL=https://updates.rushi.app/runtime/rushi-runtime-manifest.json
# Windows Git Bash: never pass /d/a/... absolutes into native node/python (cwd-relative only).
# Windows tar.exe: NEVER pass Unicode paths to `tar -f` (bsdtar mangles to ????.zip).
#   Portable/CUDA pack via scripts/ci-pack-windows-*-zip.ps1 — ASCII intermediate → verify → Chinese rename.
# R2 upload: local source path may be ASCII-staged; S3 key keeps Chinese product names.
#
# IMPORTANT: To test workflow changes, use Actions → Release build → Run workflow
# on branch `main`. Do NOT use "Re-run failed jobs" on an old run — that reuses
# the workflow file from the original commit.
name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref_name || github.sha }}
  # Prefer a single active run per tag/ref. Dual writers race on R2 worse than cancelling
  # an older force-push run (new run overwrites CDN keys).
  cancel-in-progress: true

env:
  CI: true
  BUNDLE_ROOT: apps/desktop/src-tauri/target/release/bundle
  RUSHI_UPDATER_CDN_BASE: https://updates.rushi.app

jobs:
  tauri-macos:
    if: ${{ !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Workflow context
        run: |
          set -euo pipefail
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          VER="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VER" != "$VER" ]; then
              echo "::error::git tag v${TAG_VER} != apps/desktop/package.json version ${VER}"
              exit 1
            fi
          fi
          echo "App version: $VER"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install ffmpeg (sidecar bundle)
        run: brew install ffmpeg

      - name: Build macOS FunASR sidecar (PyInstaller)
        run: bash scripts/build-asr-sidecar-unix.sh
        timeout-minutes: 120

      - name: Post-build sidecar health smoke
        run: bash scripts/smoke-asr-sidecar-health.sh
        timeout-minutes: 10

      - name: Bootstrap ASR venv (bundled models)
        run: bash scripts/bootstrap-asr-venv.sh

      - name: Cache ModelScope download (Plan B staging)
        uses: actions/cache@v6
        with:
          path: dist/bundled-asr-models/.modelscope-cache
          key: bundled-asr-models-v1-macos-${{ hashFiles('resources/bundled-asr-models-manifest.template.json', 'services/asr/rushi_asr/defaults.py') }}
          restore-keys: bundled-asr-models-v1-macos-

      - name: Stage bundled ASR models (Plan B)
        env:
          STAGE_MODEL_MAX_ATTEMPTS: "8"
        run: npm run asr:stage-bundled-models
        timeout-minutes: 180


      - name: Detect macOS signing secrets
        id: mac_sign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No APPLE_CERTIFICATE — building unsigned."
            exit 0
          fi
          if ! echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/apple-cert.p12 2>/dev/null; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_CERTIFICATE is not valid base64 — building unsigned."
            exit 0
          fi
          for v in APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v}" ]; then
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "::warning::$v is missing — building unsigned."
              exit 0
            fi
          done
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Valid Apple signing secrets detected."

      - name: Tauri build unsigned (app + dmg)
        if: steps.mac_sign.outputs.enabled != 'true'
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app,dmg
        timeout-minutes: 50

      - name: Tauri build signed (app + dmg)
        if: steps.mac_sign.outputs.enabled == 'true'
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app,dmg
        timeout-minutes: 50

      - name: Normalize macOS DMG filename (ASCII)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          bash scripts/ci-normalize-macos-dmg-name.sh \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --version "$VERSION"

      - name: Generate SHA256 checksums (macOS)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          shopt -s nullglob
          for f in "${{ env.BUNDLE_ROOT }}/dmg/"*.dmg; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Normalize macOS updater artifact names
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: mac_ota_normalize
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "ok=false" >> "$GITHUB_OUTPUT"
          MACOS_DIR="${{ env.BUNDLE_ROOT }}/macos"
          shopt -s nullglob
          tar_files=("$MACOS_DIR"/*.tar.gz)
          if [ ${#tar_files[@]} -eq 0 ]; then
            echo "::warning::Updater .tar.gz missing — set TAURI_SIGNING_PRIVATE_KEY. DMG CDN can still publish."
            exit 0
          fi
          TAR="${tar_files[0]}"
          if [ "$(basename "$TAR")" != "app.tar.gz" ]; then
            mv "$TAR" "$MACOS_DIR/app.tar.gz"
            if [ -f "${TAR}.sig" ]; then
              mv "${TAR}.sig" "$MACOS_DIR/app.tar.gz.sig"
            fi
            echo "Renamed $(basename "$TAR") -> app.tar.gz"
          else
            echo "Updater artifact already normalized."
          fi
          if [ ! -f "$MACOS_DIR/app.tar.gz.sig" ]; then
            echo "::warning::Missing $MACOS_DIR/app.tar.gz.sig — skip macOS OTA fragment."
            exit 0
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Generate updater fragment (macOS release)
        # Tag-only (same as Win): workflow_dispatch must not embed branch name as a fake tag.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.mac_ota_normalize.outputs.ok == 'true'
        id: mac_fragment
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "ok=false" >> "$GITHUB_OUTPUT"
          bash scripts/ci-generate-updater-latest-json.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --platform darwin-aarch64
          echo "ok=true" >> "$GITHUB_OUTPUT"

      # Keep bundles on Actions even if R2 upload fails (token/ACL issues).
      - name: Stage macOS workflow artifacts
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/macos-release
          shopt -s nullglob
          for f in "${{ env.BUNDLE_ROOT }}/dmg/"*.dmg "${{ env.BUNDLE_ROOT }}/dmg/"*.sha256; do
            cp "$f" dist/macos-release/
          done
          if [ -f "${{ env.BUNDLE_ROOT }}/macos/app.tar.gz" ]; then
            cp "${{ env.BUNDLE_ROOT }}/macos/app.tar.gz" dist/macos-release/
          fi
          if [ -f "${{ env.BUNDLE_ROOT }}/macos/app.tar.gz.sig" ]; then
            cp "${{ env.BUNDLE_ROOT }}/macos/app.tar.gz.sig" dist/macos-release/
          fi
          if [ -f "${{ env.BUNDLE_ROOT }}/macos/updater-fragment.json" ]; then
            cp "${{ env.BUNDLE_ROOT }}/macos/updater-fragment.json" dist/macos-release/
          fi
          ls -la dist/macos-release
          test -n "$(ls -A dist/macos-release)"

      - name: Upload macOS workflow artifacts
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-bundles
          path: dist/macos-release/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS DMG to Cloudflare R2 CDN
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT). Optional R2_BUCKET (default rushi-updates)."
            exit 1
          fi
          if ! command -v aws >/dev/null 2>&1; then
            brew install awscli
          fi
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode macos-dmg \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

      - name: Upload macOS OTA to Cloudflare R2 CDN
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.mac_fragment.outputs.ok == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          if ! command -v aws >/dev/null 2>&1; then
            brew install awscli
          fi
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode macos-ota \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

  tauri-windows:
    if: ${{ !cancelled() }}
    # pc-office-win-release: self-hosted, Windows, X64, rushi-release (E:\actions-runner).
    # Keep run.cmd / svc running or this job queues forever.
    runs-on: [self-hosted, Windows, X64, rushi-release]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Ensure Windows npm native bindings
        shell: bash
        run: bash scripts/ci-ensure-windows-npm-native-bindings.sh

      - name: Resolve Chinese Windows artifact names
        id: win_names
        shell: bash
        run: |
          set -euo pipefail
          source scripts/rushi-win-release-artifact-names.sh
          VER="$(rushi_win_app_version)"
          # Tag push must match package.json (fragment / CDN / verify all use package version).
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VER" != "$VER" ]; then
              echo "::error::git tag v${TAG_VER} != apps/desktop/package.json version ${VER}"
              exit 1
            fi
          fi
          PORTABLE="$(rushi_win_portable_zip_name "$VER")"
          NSIS="$(rushi_win_nsis_setup_name "$VER")"
          CUDA="$(rushi_win_cuda_zip_name "$VER")"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "portable=$PORTABLE" >> "$GITHUB_OUTPUT"
          echo "nsis=$NSIS" >> "$GITHUB_OUTPUT"
          echo "cuda=$CUDA" >> "$GITHUB_OUTPUT"
          {
            echo "WIN_APP_VERSION=$VER"
            echo "WIN_PORTABLE_ZIP=$PORTABLE"
            echo "WIN_NSIS_SETUP=$NSIS"
            echo "WIN_CUDA_ZIP=$CUDA"
          } >> "$GITHUB_ENV"
          echo "Portable: $PORTABLE"
          echo "NSIS:     $NSIS"

      - name: Workflow context
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Portable: ${{ env.WIN_PORTABLE_ZIP }}"
          echo "NSIS: ${{ env.WIN_NSIS_SETUP }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Build Windows FunASR sidecar (CPU only for NSIS)
        run: npm run asr:build-sidecar-windows-cpu
        timeout-minutes: 120

      - name: Verify bundled CPU sidecar artifacts
        shell: bash
        run: |
          EXE="apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/rushi-asr-sidecar.exe"
          test -f "$EXE"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/_internal/funasr/version.txt"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/_internal/ffmpeg.exe"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/sidecar-build-stamp.txt"
          # CUDA must NOT be present in the install tree before NSIS (CDN opt-in).
          if [ -e "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda" ]; then
            echo "::error::CUDA onedir must not be staged before NSIS; remove rushi-asr-sidecar-cuda"
            exit 1
          fi

      - name: Detect Windows signing secrets
        id: win_sign
        shell: bash
        env:
          WINDOWS_SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          WINDOWS_SIGN_PFX_PATH: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_SIGNTOOL_PATH" ] || [ -z "$WINDOWS_SIGN_PFX_PATH" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No Windows signing secrets — building unsigned sidecars."
            exit 0
          fi
          if [ -z "${WINDOWS_SIGN_PFX_PASSWORD:-}" ]; then
            echo "::error::WINDOWS_SIGNTOOL_PATH + WINDOWS_SIGN_PFX_PATH set but WINDOWS_SIGN_PFX_PASSWORD is empty."
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Valid Windows signing secrets detected."

      - name: Authenticode sign CPU sidecar (release tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled == 'true'
        id: win_sidecar_sign
        continue-on-error: true
        shell: pwsh
        env:
          SIGNTOOL: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          SIGN_PFX: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          SIGN_PASS: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
          RELEASE_BUILD: "1"
        run: pwsh scripts/sign-windows-sidecar.ps1

      - name: Warn if CPU sidecar Authenticode failed
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled == 'true' && steps.win_sidecar_sign.outcome != 'success'
        run: echo "::warning::CPU sidecar Authenticode failed — continuing unsigned (core NSIS/portable still builds)."

      - name: Skip Windows sidecar signing (no secrets)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled != 'true'
        run: echo "::warning::Skipping Authenticode signing — set WINDOWS_SIGNTOOL_PATH + WINDOWS_SIGN_PFX_PATH for signed releases."

      - name: Post-build sidecar health smoke
        shell: pwsh
        run: pwsh scripts/smoke-asr-sidecar-health.ps1
        timeout-minutes: 10

      - name: Prune sidecar deep license trees (makensis MAX_PATH)
        # torch *.dist-info/licenses/.../third_party/... exceeds ~260 chars under
        # apps/desktop/src-tauri/resources/bundled-asr/... and aborts makensis.
        shell: pwsh
        run: pwsh scripts/prune-windows-sidecar-for-nsis.ps1 -Onedir apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar

      # Plan B models BEFORE NSIS so installer + portable both ship default Paraformer.
      - name: Bootstrap ASR venv (Plan B models for NSIS + portable)
        shell: bash
        run: bash scripts/bootstrap-asr-venv.sh

      - name: Cache ModelScope download (Plan B staging)
        uses: actions/cache@v6
        with:
          path: dist/bundled-asr-models/.modelscope-cache
          key: bundled-asr-models-v1-windows-${{ hashFiles('resources/bundled-asr-models-manifest.template.json', 'services/asr/rushi_asr/defaults.py') }}
          restore-keys: bundled-asr-models-v1-windows-

      - name: Stage bundled ASR models into resources (NSIS + portable)
        shell: bash
        env:
          STAGE_MODEL_MAX_ATTEMPTS: "8"
        run: npm run asr:stage-bundled-models
        timeout-minutes: 180

      - name: Guard — NSIS/portable resources must include sidecar + Plan B models
        shell: bash
        run: |
          set -euo pipefail
          SIDECAR="apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar"
          MODELS="apps/desktop/src-tauri/resources/bundled-asr-models"
          if [ ! -d "$SIDECAR" ]; then
            echo "::error::Missing CPU sidecar onedir ($SIDECAR) — Windows release must ship the sidecar."
            exit 1
          fi
          if [ -e "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda" ]; then
            echo "::error::CUDA onedir must not be staged before NSIS."
            exit 1
          fi
          bash scripts/preflight-bundled-asr-models.sh "$MODELS"
          echo "OK: Windows staging has CPU sidecar + Plan B models (NSIS + portable)."

      - name: Measure Windows bundle size spike (CPU + models before NSIS)
        shell: pwsh
        run: pwsh scripts/ci-measure-windows-bundle-size.ps1 -RequirePlanBModels

      - name: Tauri build (NSIS installer + updater artifacts)
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSHI_DEFAULT_LOCAL_RUNTIME_MANIFEST_URL: https://updates.rushi.app/runtime/rushi-runtime-manifest.json
        run: npm run tauri -- build --bundles nsis
        # Larger with Plan B models; allow headroom over CPU-only builds.
        timeout-minutes: 120

      - name: Normalize Windows NSIS installer name (Chinese)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          bash scripts/ci-normalize-windows-nsis-name.sh \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --version "${{ env.WIN_APP_VERSION }}"

      - name: Measure NSIS artifact size
        shell: pwsh
        run: |
          $nsis = "apps/desktop/src-tauri/target/release/bundle/nsis/${{ env.WIN_NSIS_SETUP }}"
          if (-not (Test-Path -LiteralPath $nsis)) {
            $alt = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis" -Filter *.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notlike '*.sig' } |
              Select-Object -First 1
            if ($alt) { $nsis = $alt.FullName }
          }
          pwsh scripts/ci-measure-windows-bundle-size.ps1 -RequirePlanBModels -NsisPath $nsis
        continue-on-error: false

      # Authenticode (optional) before portable zip so the green zip can ship a signed exe.
      # Do NOT Authenticode-sign the NSIS setup here — that would invalidate the Tauri updater .sig.
      - name: Detect Windows exe signing secret
        id: win_exe_sign
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_CERTIFICATE" ] || [ -z "$WINDOWS_CERTIFICATE_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Sign Windows portable exe (optional Authenticode)
        if: steps.win_exe_sign.outputs.enabled == 'true'
        continue-on-error: true
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $certPath = Join-Path $env:TEMP "windows-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $signtool) {
            Write-Host "::warning::signtool.exe not found — portable exe left unsigned."
            exit 1
          }
          $exe = "apps/desktop/src-tauri/target/release/rushi-desktop.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            Write-Host "::warning::Missing $exe — skip Authenticode."
            exit 1
          }
          & $signtool.FullName sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::signtool failed for $exe (exit $LASTEXITCODE) — portable continues unsigned."
            exit 1
          }
          Write-Host "Signed $exe (portable zip only; NSIS .sig left intact)"

      # Models already staged before NSIS; portable reuses the same resources tree.
      # Portable (+ CDN) BEFORE updater fragment so a missing .sig cannot block the green zip.
      - name: Build + verify Windows portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # ASCII tar create/extract → Chinese rename (see scripts/ci-pack-windows-portable-zip.ps1).
          # Do NOT tar -xf the Chinese final name — Windows tar.exe mangles Unicode -f paths.
          $zipFinal = Join-Path (Get-Location) $env:WIN_PORTABLE_ZIP
          pwsh scripts/ci-pack-windows-portable-zip.ps1 `
            -ExePath "apps/desktop/src-tauri/target/release/rushi-desktop.exe" `
            -ResourcesDir "apps/desktop/src-tauri/resources" `
            -FinalZipPath $zipFinal `
            -WriteSha256
          $nsis = "apps/desktop/src-tauri/target/release/bundle/nsis/$($env:WIN_NSIS_SETUP)"
          if (-not (Test-Path -LiteralPath $nsis)) {
            throw "Missing $nsis for checksum"
          }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $nsis).Hash.ToLowerInvariant()
          $name = Split-Path -Leaf $nsis
          Set-Content -Encoding utf8 -Path "$nsis.sha256" -Value "$hash  $name"
          Write-Host "Wrote $nsis.sha256"
          # ASCII alias for upload-artifact (avoids rare Unicode path misses on GHA).
          Copy-Item -LiteralPath $zipFinal -Destination "windows-portable-x64.zip" -Force
          Copy-Item -LiteralPath "$zipFinal.sha256" -Destination "windows-portable-x64.zip.sha256" -Force
          Get-Item -LiteralPath $zipFinal | Format-List Name, Length, FullName

      - name: Upload Windows portable zip artifact (early)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable-x64
          path: |
            windows-portable-x64.zip
            windows-portable-x64.zip.sha256
            ${{ env.WIN_PORTABLE_ZIP }}
            ${{ env.WIN_PORTABLE_ZIP }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows portable + NSIS to CDN (early)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          source scripts/ci-pip-venv-install.sh awscli
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode windows \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

      - name: Free portable ASCII alias after CDN (disk)
        # Mirror Restore portable ASCII alias — tag push and workflow_dispatch.
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        shell: pwsh
        run: |
          # Chinese zip remains for final artifacts; drop ~1.5GiB ASCII duplicate until re-copy.
          if (Test-Path -LiteralPath "windows-portable-x64.zip") {
            Remove-Item -LiteralPath "windows-portable-x64.zip" -Force
            Write-Host "Removed windows-portable-x64.zip (ASCII alias; restored before final artifacts)"
          }
          if (Test-Path -LiteralPath "windows-portable-x64.zip.sha256") {
            Remove-Item -LiteralPath "windows-portable-x64.zip.sha256" -Force
          }

      - name: Generate updater fragment (Windows release)
        # Tag-only: workflow_dispatch on a branch would embed github.ref_name as a fake tag.
        # Soft: missing .sig / fragment errors must NOT fail the job after portable/NSIS are on CDN.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: win_fragment
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          SIG="${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}.sig"
          if [ ! -f "$SIG" ]; then
            echo "::warning::Missing $SIG — skip Windows OTA fragment (set TAURI_SIGNING_PRIVATE_KEY). Portable/NSIS CDN upload is unaffected."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash scripts/ci-generate-updater-latest-json.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --platform windows-x86_64
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Upload Windows OTA (.exe + .sig) to CDN
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_fragment.outputs.ok == 'true'
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          source scripts/ci-pip-venv-install.sh awscli
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode windows-ota \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

      # CUDA is best-effort: never fail the job after portable/NSIS are on CDN.
      - name: Build Windows CUDA sidecar (CDN opt-in, after NSIS)
        id: cuda_build
        run: npm run asr:build-sidecar-windows-cuda
        timeout-minutes: 120
        continue-on-error: true

      - name: Authenticode sign CUDA sidecar (release tag)
        id: cuda_sign
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled == 'true' && steps.cuda_build.outcome == 'success'
        shell: pwsh
        env:
          SIGNTOOL: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          SIGN_PFX: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          SIGN_PASS: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
          RELEASE_BUILD: "1"
        run: pwsh scripts/sign-windows-sidecar.ps1
        continue-on-error: true

      - name: Package CUDA sidecar zip + checksum
        id: cuda_zip
        if: steps.cuda_build.outcome == 'success'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pwsh scripts/ci-pack-windows-cuda-zip.ps1 `
            -CudaOnedir "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda" `
            -FinalZipPath (Join-Path (Get-Location) "dist/cuda-cdn/$($env:WIN_CUDA_ZIP)") `
            -WriteSha256
          "ok=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        continue-on-error: true

      - name: Publish CUDA runtime manifest
        id: cuda_manifest
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.cuda_zip.outcome == 'success'
        shell: bash
        env:
          RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX: ${{ secrets.RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX:-}" ]; then
            echo "::error::Missing RUSHI_RUNTIME_MANIFEST_SIGNING_KEY_HEX for CUDA manifest signing."
            exit 1
          fi
          source scripts/ci-pip-venv-install.sh cryptography
          bash scripts/ci-publish-cuda-runtime-manifest.sh \
            --tag "${{ github.ref_name }}" \
            --zip "dist/cuda-cdn/${{ env.WIN_CUDA_ZIP }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}"

      - name: Upload Windows CUDA to Cloudflare R2 CDN
        id: cuda_cdn
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.cuda_zip.outcome == 'success' && steps.cuda_manifest.outcome == 'success'
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          source scripts/ci-pip-venv-install.sh awscli
          bash scripts/ci-upload-updater-cdn.sh \
            --tag "${{ github.ref_name }}" \
            --mode windows-cuda \
            --cuda-zip "dist/cuda-cdn/${{ env.WIN_CUDA_ZIP }}" \
            --runtime-manifest dist/runtime-manifest/rushi-runtime-manifest.json \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --bucket "${R2_BUCKET:-rushi-updates}"

      - name: Report CUDA opt-in outcome
        if: always() && (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        shell: bash
        run: |
          set -euo pipefail
          build="${{ steps.cuda_build.outcome }}"
          zip="${{ steps.cuda_zip.outcome }}"
          man="${{ steps.cuda_manifest.outcome }}"
          cdn="${{ steps.cuda_cdn.outcome }}"
          echo "CUDA outcomes: build=$build zip=$zip manifest=$man cdn=$cdn"
          # CUDA is best-effort. Do not use ::error:: when skipped due to upstream core failure —
          # that annotation drowned the real portable-zip failure in the Actions UI.
          if [ "$build" = "skipped" ] || [ "$zip" = "skipped" ]; then
            echo "::warning::CUDA opt-in skipped (often because an earlier core step failed, or CUDA build was not reached)."
            exit 0
          fi
          if [ "$build" != "success" ] || [ "$zip" != "success" ]; then
            echo "::warning::CUDA sidecar build/package failed — CDN opt-in zip missing. Check whether core portable/NSIS still published."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ] && { [ "$man" != "success" ] || [ "$cdn" != "success" ]; }; then
            echo "::warning::CUDA manifest/CDN upload failed — runtime GPU install may be unavailable."
            exit 0
          fi
          echo "CUDA opt-in pipeline OK."

      - name: Report Windows core release status
        if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')))
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Windows core status (partial CDN is possible if a later step failed) ==="
          echo "portable_zh: ${{ env.WIN_PORTABLE_ZIP }}"
          echo "nsis_zh:     ${{ env.WIN_NSIS_SETUP }}"
          echo "fragment_ok: ${{ steps.win_fragment.outputs.ok }}"
          if [ -f "windows-portable-x64.zip" ]; then
            echo "portable_ascii_alias: present ($(wc -c < windows-portable-x64.zip) bytes)"
          else
            echo "portable_ascii_alias: MISSING"
          fi
          if [ -f "${{ env.WIN_PORTABLE_ZIP }}" ]; then
            echo "portable_chinese: present"
          else
            echo "portable_chinese: MISSING"
          fi
          if [ -f "${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}" ]; then
            echo "nsis: present"
          else
            echo "nsis: MISSING"
          fi

      - name: Restore portable ASCII alias for artifacts
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipFinal = Join-Path (Get-Location) $env:WIN_PORTABLE_ZIP
          if (-not (Test-Path -LiteralPath $zipFinal)) {
            throw "Missing portable zip for artifacts: $zipFinal"
          }
          if (-not (Test-Path -LiteralPath "windows-portable-x64.zip")) {
            Copy-Item -LiteralPath $zipFinal -Destination "windows-portable-x64.zip" -Force
          }
          if ((Test-Path -LiteralPath "$zipFinal.sha256") -and -not (Test-Path -LiteralPath "windows-portable-x64.zip.sha256")) {
            Copy-Item -LiteralPath "$zipFinal.sha256" -Destination "windows-portable-x64.zip.sha256" -Force
          }

      - name: Upload Windows workflow artifacts (required core)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-bundles
          path: |
            windows-portable-x64.zip
            windows-portable-x64.zip.sha256
            ${{ env.WIN_PORTABLE_ZIP }}
            ${{ env.WIN_PORTABLE_ZIP }}.sha256
            ${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}
            ${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}.sha256
            dist/windows-bundle-size-spike.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows OTA fragment artifacts
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_fragment.outputs.ok == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-ota-fragment
          path: |
            ${{ env.BUNDLE_ROOT }}/nsis/${{ env.WIN_NSIS_SETUP }}.sig
            ${{ env.BUNDLE_ROOT }}/nsis/updater-fragment.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows CUDA artifacts (optional)
        if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) && steps.cuda_zip.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: windows-cuda-cdn
          path: |
            dist/cuda-cdn/**
            dist/runtime-manifest/**
          if-no-files-found: warn
          retention-days: 14

  verify-cdn-release:
    needs: [tauri-macos, tauri-windows]
    # always() required: without it GHA skips this job when any `needs` job fails,
    # so the soft OTA / one-side-success path never runs.
    if: >-
      always() &&
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') &&
      !cancelled() &&
      (needs.tauri-macos.result == 'success' || needs.tauri-windows.result == 'success')
    # macOS only — no Linux release matrix; avoid ubuntu runners for this job.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: macos-release-bundles
          path: artifacts/macos

      - uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: windows-release-bundles
          path: artifacts/windows

      - uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: windows-ota-fragment
          path: artifacts/windows

      - uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: windows-cuda-cdn
          path: artifacts/windows-cuda

      - name: Merge and upload OTA manifest
        id: merge_manifest
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          echo "uploaded=false" >> "$GITHUB_OUTPUT"
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ENDPOINT:-}" ]; then
            echo "::error::Missing R2 secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT)."
            exit 1
          fi
          command -v jq >/dev/null || brew install jq
          source scripts/ci-pip-venv-install.sh awscli
          MAC_FRAGMENT="$(find artifacts/macos -name updater-fragment.json | head -1 || true)"
          WIN_FRAGMENT="$(find artifacts/windows -name updater-fragment.json | head -1 || true)"
          if [ -z "$MAC_FRAGMENT" ] || [ -z "$WIN_FRAGMENT" ]; then
            echo "::warning::OTA gate: need BOTH mac + win updater fragments to publish latest.json (Tauri validates whole file)."
            echo "::warning::mac_fragment=${MAC_FRAGMENT:-MISSING} win_fragment=${WIN_FRAGMENT:-MISSING}"
            echo "::warning::Leaving previous CDN latest.json untouched; install/portable CDN may still be OK."
            find artifacts -type f || true
            exit 0
          fi
          set +e
          bash scripts/ci-merge-updater-manifest.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}" \
            --out dist/updater/latest.json \
            --fragment "$MAC_FRAGMENT" \
            --fragment "$WIN_FRAGMENT" \
            --preserve-cdn \
            --require-platforms "darwin-aarch64,windows-x86_64" \
            --upload \
            --bucket "${R2_BUCKET:-rushi-updates}"
          merge_rc=$?
          set -e
          if [ "$merge_rc" -eq 2 ]; then
            echo "::warning::OTA gate refused partial latest.json — previous CDN latest.json kept."
            exit 0
          fi
          if [ "$merge_rc" -ne 0 ]; then
            echo "::error::ci-merge-updater-manifest.sh failed (exit ${merge_rc})."
            exit "$merge_rc"
          fi
          echo "uploaded=true" >> "$GITHUB_OUTPUT"

      - name: Verify OTA manifest + portable CDN
        env:
          RUSHI_VERIFY_REQUIRE_LATEST: ${{ steps.merge_manifest.outputs.uploaded }}
          RUSHI_VERIFY_REQUIRE_PORTABLE: ${{ needs.tauri-windows.result == 'success' }}
        run: |
          bash scripts/ci-verify-updater-manifest.sh \
            --tag "${{ github.ref_name }}" \
            --cdn-base "${{ env.RUSHI_UPDATER_CDN_BASE }}"
