# Full Tauri bundles — tag push creates draft Release, CI uploads macOS + Windows, then publishes.
# Windows portable/NSIS: CI on tag push; local smoke — `npm run release:win` on a Windows machine.
# Do NOT run `gh release create` before CI: push tag only (`git push origin vX.Y.Z`).
# Sidecar is built before Tauri bundle; artifacts upload via gh release upload.
# macOS signing (optional): set valid APPLE_* repository secrets (base64 .p12).
# App OTA: set TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
#   Tauri generates .app.tar.gz + .sig; CI produces macOS latest.json.
# Plan B (v0.1.8+): default Paraformer models are bundled into the installer.
# No runtime manifest / OTA sidecar artifacts are produced.
#
# IMPORTANT: To test workflow changes, use Actions → Release build → Run workflow
# on branch `main`. Do NOT use "Re-run failed jobs" on an old run — that reuses
# the workflow file from the original commit.
name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.ref_name || github.sha }}
  cancel-in-progress: true

env:
  CI: true
  BUNDLE_ROOT: apps/desktop/src-tauri/target/release/bundle

jobs:
  prepare-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Ensure draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-ensure-draft-release.sh \
            --tag "${{ github.ref_name }}" \
            --repository "${{ github.repository }}"

  tauri-macos:
    needs: [prepare-release]
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Workflow context
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install ffmpeg (sidecar bundle)
        run: brew install ffmpeg

      - name: Build macOS FunASR sidecar (PyInstaller)
        run: bash scripts/build-asr-sidecar-unix.sh
        timeout-minutes: 120

      - name: Post-build sidecar health smoke
        run: bash scripts/smoke-asr-sidecar-health.sh
        timeout-minutes: 10

      - name: Bootstrap ASR venv (bundled models)
        run: bash scripts/bootstrap-asr-venv.sh

      - name: Stage bundled ASR models (Plan B)
        run: npm run asr:stage-bundled-models
        timeout-minutes: 120


      - name: Detect macOS signing secrets
        id: mac_sign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No APPLE_CERTIFICATE — building unsigned."
            exit 0
          fi
          if ! echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/apple-cert.p12 2>/dev/null; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_CERTIFICATE is not valid base64 — building unsigned."
            exit 0
          fi
          for v in APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v}" ]; then
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "::warning::$v is missing — building unsigned."
              exit 0
            fi
          done
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Valid Apple signing secrets detected."

      - name: Tauri build unsigned (app + dmg)
        if: steps.mac_sign.outputs.enabled != 'true'
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app,dmg
        timeout-minutes: 50

      - name: Tauri build signed (app + dmg)
        if: steps.mac_sign.outputs.enabled == 'true'
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles app,dmg
        timeout-minutes: 50

      - name: Normalize macOS DMG filename (ASCII)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          bash scripts/ci-normalize-macos-dmg-name.sh \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --version "$VERSION"

      - name: Generate SHA256 checksums (macOS)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          shopt -s nullglob
          for f in "${{ env.BUNDLE_ROOT }}/dmg/"*.dmg; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Normalize macOS updater artifact names
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          MACOS_DIR="${{ env.BUNDLE_ROOT }}/macos"
          shopt -s nullglob
          tar_files=("$MACOS_DIR"/*.tar.gz)
          if [ ${#tar_files[@]} -eq 0 ]; then
            echo "::error::Updater .tar.gz missing — set TAURI_SIGNING_PRIVATE_KEY and matching pubkey in tauri.conf.json"
            exit 1
          fi
          TAR="${tar_files[0]}"
          if [ "$(basename "$TAR")" = "app.tar.gz" ]; then
            echo "Updater artifact already normalized."
            exit 0
          fi
          mv "$TAR" "$MACOS_DIR/app.tar.gz"
          if [ -f "${TAR}.sig" ]; then
            mv "${TAR}.sig" "$MACOS_DIR/app.tar.gz.sig"
          fi
          echo "Renamed $(basename "$TAR") -> app.tar.gz"

      - name: Generate updater latest.json (macOS release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          bash scripts/ci-generate-updater-latest-json.sh \
            --tag "${{ github.ref_name }}" \
            --repository "${{ github.repository }}" \
            --bundle-root "${{ env.BUNDLE_ROOT }}" \
            --platform darwin-aarch64

      - name: Upload macOS workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-bundles
          path: |
            ${{ env.BUNDLE_ROOT }}/dmg/*.dmg
            ${{ env.BUNDLE_ROOT }}/dmg/*.sha256
          if-no-files-found: error

      - name: Upload macOS bundles to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          dmg_files=("${{ env.BUNDLE_ROOT }}/dmg/"*.dmg)
          sha_files=("${{ env.BUNDLE_ROOT }}/dmg/"*.sha256)
          tar_files=("${{ env.BUNDLE_ROOT }}/macos/"*.tar.gz)
          tar_sig_files=("${{ env.BUNDLE_ROOT }}/macos/"*.tar.gz.sig)
          latest_json="${{ env.BUNDLE_ROOT }}/macos/latest.json"
          upload=( "${dmg_files[@]}" "${sha_files[@]}" )
          if [ ${#tar_files[@]} -eq 0 ]; then
            echo "::error::Updater .tar.gz missing — set TAURI_SIGNING_PRIVATE_KEY and matching pubkey in tauri.conf.json"
            exit 1
          fi
          upload+=( "${tar_files[@]}" "${tar_sig_files[@]}" )
          if [ ! -f "$latest_json" ]; then
            echo "::error::latest.json missing after generate step"
            exit 1
          fi
          upload+=( "$latest_json" )
          gh release upload "${{ github.ref_name }}" "${upload[@]}" --clobber

  tauri-windows:
    needs: prepare-release
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Ensure Windows npm native bindings
        shell: bash
        run: bash scripts/ci-ensure-windows-npm-native-bindings.sh

      - name: Workflow context
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Build Windows FunASR sidecar (PyInstaller)
        run: npm run asr:build-sidecar-windows-cpu
        timeout-minutes: 120

      - name: Build Windows FunASR sidecar (CUDA)
        run: npm run asr:build-sidecar-windows-cuda
        timeout-minutes: 120

      - name: Verify bundled sidecar artifacts
        shell: bash
        run: |
          EXE="apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/rushi-asr-sidecar.exe"
          CUDA_EXE="apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda/rushi-asr-sidecar-cuda.exe"
          test -f "$EXE"
          test -f "$CUDA_EXE"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/_internal/funasr/version.txt"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/_internal/ffmpeg.exe"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar/sidecar-build-stamp.txt"
          test -f "apps/desktop/src-tauri/resources/bundled-asr/rushi-asr-sidecar-cuda/sidecar-build-stamp.txt"

      - name: Detect Windows signing secrets
        id: win_sign
        shell: bash
        env:
          WINDOWS_SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          WINDOWS_SIGN_PFX_PATH: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
        run: |
          if [ -z "$WINDOWS_SIGNTOOL_PATH" ] || [ -z "$WINDOWS_SIGN_PFX_PATH" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No Windows signing secrets — building unsigned sidecars."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Valid Windows signing secrets detected."

      - name: Authenticode sign bundled sidecars (release tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGNTOOL: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          SIGN_PFX: ${{ secrets.WINDOWS_SIGN_PFX_PATH }}
          SIGN_PASS: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
          RELEASE_BUILD: "1"
        run: pwsh scripts/sign-windows-sidecar.ps1

      - name: Skip Windows sidecar signing (no secrets)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.win_sign.outputs.enabled != 'true'
        run: echo "::warning::Skipping Authenticode signing — set WINDOWS_SIGNTOOL_PATH + WINDOWS_SIGN_PFX_PATH for signed releases."

      - name: Post-build sidecar health smoke
        shell: pwsh
        run: pwsh scripts/smoke-asr-sidecar-health.ps1
        timeout-minutes: 10

      - name: Bootstrap ASR venv (bundled models)
        shell: bash
        run: bash scripts/bootstrap-asr-venv.sh

      - name: Stage bundled ASR models (Plan B)
        shell: bash
        run: npm run asr:stage-bundled-models
        timeout-minutes: 120

      - name: Tauri build binary (Windows)
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --no-bundle
        timeout-minutes: 90

      - name: Tauri build (NSIS installer, optional)
        id: windows_nsis
        continue-on-error: true
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles nsis
        timeout-minutes: 60

      - name: Detect Windows exe signing secret
        id: win_exe_sign
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$WINDOWS_CERTIFICATE" ] || [ -z "$WINDOWS_CERTIFICATE_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Sign Windows executable (optional)
        if: steps.win_exe_sign.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = "$env:TEMP\windows-cert.pfx"
          [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE) | Set-Content -Path $certPath -Encoding Byte
          $exe = "apps/desktop/src-tauri/target/release/rushi-desktop.exe"
          if (-not (Test-Path $exe)) { exit 0 }
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $signtool) {
            Write-Warning "signtool.exe not found; skipping Windows signing."
            exit 0
          }
          & $signtool.FullName sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe
          Write-Host "Signed $exe"

      - name: Build Windows portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = "apps/desktop/src-tauri"
          $exe = Join-Path $root "target/release/rushi-desktop.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Missing $exe — run tauri build before packaging portable zip."
          }
          $stage = "dist/windows-portable"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe (Join-Path $stage "rushi-desktop.exe")
          Copy-Item (Join-Path $root "resources") (Join-Path $stage "resources") -Recurse
          if (Test-Path "windows-portable-x64.zip") { Remove-Item -Force "windows-portable-x64.zip" }
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath "windows-portable-x64.zip"

      - name: Verify Windows portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "windows-portable-x64.zip")) {
            throw "Missing windows-portable-x64.zip"
          }
          Get-Item "windows-portable-x64.zip"

      - name: Generate SHA256 checksums (Windows)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in windows-portable-x64.zip "${{ env.BUNDLE_ROOT }}/nsis/"*-setup.exe; do
            if [ -f "$f" ]; then
              sha256sum "$f" > "$f.sha256"
            fi
          done

      - name: Upload Windows workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-bundles
          path: |
            windows-portable-x64.zip
            windows-portable-x64.zip.sha256
            ${{ env.BUNDLE_ROOT }}/nsis/*-setup.exe
            ${{ env.BUNDLE_ROOT }}/nsis/*.sha256
          if-no-files-found: warn

      - name: Upload Windows bundles to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: windows_release_upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-upload-windows-release-assets.sh \
            --tag "${{ github.ref_name }}" \
            --bundle-root "${{ env.BUNDLE_ROOT }}"
          if [ -d .ci-windows-offsite ] && [ -n "$(ls -A .ci-windows-offsite 2>/dev/null)" ]; then
            echo "offsite=true" >> "$GITHUB_OUTPUT"
          else
            echo "offsite=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Windows offsite bundles (artifact)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && steps.windows_release_upload.outputs.offsite == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-offsite-bundles-${{ github.ref_name }}
          path: .ci-windows-offsite/**
          retention-days: 90
          if-no-files-found: error

  publish-release:
    needs: [prepare-release, tauri-macos, tauri-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.tauri-macos.result == 'success' && needs.tauri-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify OTA manifest on GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-verify-updater-manifest.sh \
            --tag "${{ github.ref_name }}" \
            --repository "${{ github.repository }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-publish-github-release.sh --tag "${{ github.ref_name }}"
