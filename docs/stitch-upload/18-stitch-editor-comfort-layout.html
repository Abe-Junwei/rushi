<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rushi Editor Comfort Layout</title>
    <style>
      :root {
        --bg: #ffffff;
        --sub: #f7f7f5;
        --line: #e3e2e0;
        --text: #37352f;
        --muted: #6b6b6b;
        --accent: #c58a43;
        --accent-deep: #85530f;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2efe8; color: var(--text); }
      .app { display: grid; grid-template-columns: 256px 1fr; min-height: 100vh; }
      .side { border-right: 1px solid var(--line); background: var(--sub); }
      .main { display: flex; min-width: 0; flex-direction: column; background: var(--bg); }
      .top { display: flex; height: 60px; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding: 0 16px; }
      .toolbar { display: flex; height: 46px; align-items: center; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--line); padding: 6px 12px; }
      .toolbar::-webkit-scrollbar { display: none; }
      .btn { height: 32px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); padding: 0 10px; font-size: 12px; color: var(--text); white-space: nowrap; }
      .btn.primary { border-color: transparent; background: var(--accent); color: #fff; }
      .btn.primary:hover { background: var(--accent-deep); }
      .sep { width: 1px; height: 16px; background: var(--line); }
      .content { display: flex; min-height: 0; flex: 1; flex-direction: column; gap: 10px; padding: 10px; background: var(--sub); }
      .wave { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--bg); }
      .wave-hd { display: flex; height: 36px; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); padding: 0 10px; font-size: 11px; color: var(--muted); }
      .wave-body { position: relative; height: 236px; background: linear-gradient(180deg, #fbfbfa, #f4f4f3); }
      .wave-body::after { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: #d8d8d6; }
      .seg { position: absolute; top: 92px; height: 42px; border: 1px solid #c8b08b; border-radius: 8px; background: #f6ead8; }
      .zoom { display: flex; height: 34px; align-items: center; gap: 8px; border-top: 1px solid var(--line); padding: 0 10px; font-size: 11px; }
      .editor { display: flex; min-height: 0; flex: 1; flex-direction: column; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: var(--bg); }
      .editor-hd { display: flex; height: 42px; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); padding: 0 10px; background: #fcfcfb; }
      .icon { width: 30px; height: 30px; border: 1px solid var(--line); border-radius: 6px; background: var(--sub); }
      .list { min-height: 0; flex: 1; overflow: auto; padding: 10px; }
      .row { display: grid; grid-template-columns: 148px 1fr; gap: 8px; border: 1px solid var(--line); border-radius: 8px; padding: 9px; font-size: 12px; background: #fff; }
      .row + .row { margin-top: 10px; }
      .meta { color: var(--muted); font-size: 11px; }
      .foot { display: flex; height: 30px; align-items: center; justify-content: space-between; border-top: 1px solid var(--line); padding: 0 10px; font-size: 11px; color: var(--muted); background: #fcfcfb; }
      @media (max-width: 1080px) { .app { grid-template-columns: 1fr; } .side { display: none; } }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side"></aside>
      <main class="main">
        <header class="top">
          <div>← 课堂口述转写 / lecture.wav</div>
          <button class="btn">环境与 ASR</button>
        </header>
        <section class="toolbar">
          <button class="btn">导入素材</button>
          <div class="sep"></div>
          <button class="btn">从 ASR 拉取语段</button>
          <button class="btn primary">导出</button>
          <button class="btn">保存</button>
          <div class="sep"></div>
          <button class="btn">拆分</button>
          <button class="btn">合并上一条</button>
          <button class="btn">合并下一条</button>
        </section>
        <section class="content">
          <div class="wave">
            <div class="wave-hd"><span>00:01:22 / 00:43:16</span><span>波形就绪 · 点击联动文本</span></div>
            <div class="wave-body">
              <div class="seg" style="left: 7%; width: 14%"></div>
              <div class="seg" style="left: 24%; width: 10%"></div>
              <div class="seg" style="left: 40%; width: 17%"></div>
              <div class="seg" style="left: 64%; width: 12%"></div>
            </div>
            <div class="zoom"><span>92% Zoom</span><span>·</span><span>52 px/s</span><span>·</span><span>适配选段</span></div>
          </div>
          <div class="editor">
            <div class="editor-hd">
              <div>
                <button class="icon" aria-label="撤销"></button>
                <button class="icon" aria-label="重做"></button>
                <button class="icon" aria-label="历史"></button>
              </div>
              <div>
                <button class="btn">字体</button>
                <button class="btn">加粗</button>
                <button class="btn">斜体</button>
              </div>
            </div>
            <div class="list">
              <article class="row"><div class="meta">#01 00:00:12-00:00:21</div><div>平衡紧凑版在保留密度优化的同时，优先保证文本可读性与操作舒适度。</div></article>
              <article class="row"><div class="meta">#02 00:00:22-00:00:31</div><div>模块间距比 Dense 略大一档，适合长时间编辑时减少视觉疲劳。</div></article>
              <article class="row"><div class="meta">#03 00:00:32-00:00:40</div><div>整体仍避免无效留白，工具区保持单行优先与稳定层级。</div></article>
            </div>
          </div>
        </section>
        <footer class="foot"><span>92% Zoom · 52 px/s</span><span>双击波形切片</span><span>快捷键 · 文档 · 支持</span></footer>
      </main>
    </div>
  </body>
</html>
