[package]
name = "wasm-waveform"
version = "0.1.0"
edition = "2021"
authors = ["Rushi Team"]
description = "Canvas 2D waveform renderer via wasm-bindgen for Rushi"
license = "ISC"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"

[dependencies.web-sys]
version = "0.3"
features = [
  "console",
  "CanvasRenderingContext2d",
  "HtmlCanvasElement",
  "Window",
  "Document",
]

[profile.release]
opt-level = 3
lto = true
