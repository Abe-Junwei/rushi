# CPU + MPS PyTorch + FunASR stack for PyInstaller ASR sidecar (CPU/MPS variant).
# Generated: macOS arm64, Python 3.12, pip freeze after:
#   pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
#   pip install -e ".[funasr]"  (rushi-asr itself bundled separately in PyInstaller, not from this file)
#
# Install (sidecar build venv):
#   pip install -r requirements-sidecar-cpu-macos-arm64.lock
#
# macOS x86_64 / Windows CPU: 见 `requirements-sidecar-cpu-*.lock` 中的 `-r` 引用。
# 更新本文件：仓库根 `bash scripts/regen-sidecar-cpu-lock.sh` 后 `bash scripts/regen-sidecar-cuda-win-lock.sh`。
#
--index-url https://download.pytorch.org/whl/cpu
--extra-index-url https://pypi.org/simple/

